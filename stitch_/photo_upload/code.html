<body class="bg-background text-on-background min-h-screen pb-24">
<!-- TopAppBar Component -->
<header class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-100 dark:border-slate-800 shadow-sm docked full-width top-0 sticky z-50 flex items-center justify-between w-full px-4 h-16">
<div class="flex items-center gap-3">
<button class="text-teal-700 dark:text-teal-400 active:scale-95 transition-transform p-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800">

<h1 class="font-manrope font-bold text-lg tracking-tight text-slate-900 dark:text-slate-100">Upload Photos</h1>

<div class="flex items-start gap-3 p-4 bg-primary-container/30 rounded-xl border border-primary/10">

<div>
<p class="text-on-surface font-semibold text-sm mb-1">Upload Repair Photos</p>

</div>
</div>
</section>
<!-- Quick Action Buttons -->
<section class="grid grid-cols-2 gap-4 mb-8">
<button class="flex flex-col items-center justify-center gap-2 p-6 bg-surface-container rounded-2xl shadow-sm border border-outline hover:bg-slate-50 transition-colors active:scale-95 group">
<div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-all">
<span class="material-symbols-outlined text-2xl" data-icon="photo_camera">photo_camera</span>
</div>
<span class="font-bold text-sm text-on-surface">拍照</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-6 bg-surface-container rounded-2xl shadow-sm border border-outline hover:bg-slate-50 transition-colors active:scale-95 group">
<div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-all">
<span class="material-symbols-outlined text-2xl" data-icon="collections">collections</span>
</div>
<span class="font-bold text-sm text-on-surface">从相册选择</span>
</button>
</section>
<!-- Photo Grid Section -->
<section>
<div class="flex items-center justify-between mb-4 px-1">
<h2 class="font-bold text-on-surface text-sm uppercase tracking-wider">Selected Photos (3/5)</h2>
<span class="text-xs font-medium text-on-surface-variant italic">VUV Context Enabled</span>
</div>
<div class="grid grid-cols-3 gap-3">
<!-- Photo Card 1 -->
<div class="relative aspect-square rounded-xl overflow-hidden group shadow-sm border border-outline">
<img class="w-full h-full object-cover" data-alt="Close up of internal circuit board with repair tools in soft natural lighting, professional technical style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDn7g_GFjZ1XweOpPCpvDcL7OLpLH6WsZ-8mhDBzUOmGEolCjYDGvd3ub5Tpr5lpDbRCv0HVJIDXqIrX-dUWvSaPtZpbZ0bj2Us7xTt0aTvV7kUFH_qfqZLGop7NW9w7fS_KRvpWNJKxvIVBBRSANXR-TCxXYMTGUjXkWZsG4v3PfUuPPIBDF97psNQW_i6CZ1X4_TG4S0I1NruKd4uva6vsWPFhItnfwhROyu9GBpzhSUF_ohcioTmq1BWWLZxqEo2wHwbIISkaEpJ"/>

<button class="absolute top-1.5 right-1.5 bg-white/90 text-error p-1 rounded-full shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
<button class="absolute bottom-1.5 left-1.5 bg-primary/90 text-white p-1 rounded-lg shadow-lg active:scale-90 transition-transform flex items-center gap-1 px-2">
<span class="material-symbols-outlined text-[14px]" data-icon="edit_note">edit_note</span>
<span class="text-[10px] font-bold">Edit</span>
</button>
</div>
<!-- Photo Card 2 -->
<div class="relative aspect-square rounded-xl overflow-hidden group shadow-sm border border-outline">
<img class="w-full h-full object-cover" data-alt="Industrial equipment casing showing damage before repair, bright clinical lighting on textured metallic surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDIkq-dqnseQ9ugvWshqUxAYW5jzRjMlOdvdc5Skxvto6Zxcj9DB_ZP_88FiDWWHEnSiooJYZ5lI1ml4_lpR8aoSacGDq8AxVxPYcTV636UkO_rVr6lCb6LLJPUCx64khUVmAP01mlGviDGNrRU9WEUbJTlPKmyNZwgJT0WIdHs8S5gyYngxV_tgd_Ii5cquLtUeTjVoZHlqfJ_hbfIvsdcuOl2NOhfxwE2jwDiY0ytaiEq2yEPLk9gJz2wD76vRxbI2y_fwk5x2kAa"/>
<div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition-colors"></div>
<button class="absolute top-1.5 right-1.5 bg-white/90 text-error p-1 rounded-full shadow-lg">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
<button class="absolute bottom-1.5 left-1.5 bg-primary/90 text-white p-1 rounded-lg shadow-lg flex items-center gap-1 px-2">
<span class="material-symbols-outlined text-[14px]" data-icon="edit_note">edit_note</span>
<span class="text-[10px] font-bold">Edit</span>
</button>
</div>
<!-- Photo Card 3 -->
<div class="relative aspect-square rounded-xl overflow-hidden group shadow-sm border border-outline">
<img class="w-full h-full object-cover" data-alt="Technician hands soldering a component onto a green motherboard, macro shot with teal tint accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCrtiB6C-cjwQTXJ015mN9mylPtTUHdB_PH1SR44Ezrj9ylMW5AfWKSmfZ8-tZotHzNYZNfrAOXruEez6GFo_h5oVFA9Rl82zpq51nvAVXogvvbNGskC7NABZ6rm5zu9AmYyGrD3PpekNzLFbEGviUyK1eeyLvrFja5JzJ1OrwRkFHZp_nvGQZZSVkMDiwYvXaqqQS80BX3qn0CxQLfjWltJ2IJANpGBURyvfUePMKvN8musvjo8beikLXxJpj5G6LkikQJXsnlX_0D"/>
<div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition-colors"></div>
<button class="absolute top-1.5 right-1.5 bg-white/90 text-error p-1 rounded-full shadow-lg">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
<button class="absolute bottom-1.5 left-1.5 bg-primary/90 text-white p-1 rounded-lg shadow-lg flex items-center gap-1 px-2">
<span class="material-symbols-outlined text-[14px]" data-icon="edit_note">edit_note</span>
<span class="text-[10px] font-bold">Edit</span>
</button>
</div>
<!-- Add Placeholder -->

<span class="material-symbols-outlined text-2xl mb-1" data-icon="add_a_photo">add_a_photo</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Add More</span>

</div>
</section>
<!-- Secondary Details -->
<section class="mt-8 space-y-4">
<div class="p-4 bg-white rounded-xl shadow-sm border border-outline flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-secondary-container flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
</div>
<div>
<p class="text-xs font-bold text-on-surface-variant uppercase tracking-wide">Repair ID</p>
<p class="text-sm font-bold text-on-surface">#RP-99284-VU</p>
</div>
</div>
<div class="text-right">
<p class="text-xs font-bold text-on-surface-variant uppercase tracking-wide">Total Value</p>
<p class="text-sm font-extrabold text-primary">12,500 VUV</p>
</div>
</div>
</section>
</main>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50 rounded-t-2xl">

<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-6 py-2 hover:text-teal-600 dark:hover:text-teal-200 active:scale-98 transition-all duration-200">
<span class="material-symbols-outlined mb-1" data-icon="close">close</span>
<span class="font-manrope font-bold uppercase text-[10px] tracking-widest">取消</span>

<button class="flex flex-col items-center justify-center bg-teal-50 dark:bg-teal-900/30 text-teal-700 dark:text-teal-300 rounded-xl px-8 py-2 hover:text-teal-600 dark:hover:text-teal-200 active:scale-98 transition-all duration-200">
<span class="material-symbols-outlined mb-1" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-manrope font-bold uppercase text-[10px] tracking-widest">确认上传</span>
</button>
</nav>
</body></html>
