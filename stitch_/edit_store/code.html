<h1 class="font-manrope font-extrabold text-xl tracking-tight text-[#007E85]">编辑门店信息</h1>
</div>

</button>
</div>
<button class="aspect-square border-2 border-dashed border-outline rounded-xl flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-3xl mb-1">add_a_photo</span>
<span class="text-[10px] font-bold uppercase tracking-wider">添加照片</span>
</button>
</div>
</section>
<!-- Form Section -->
<section class="bg-surface-container rounded-xl shadow-sm overflow-hidden divide-y divide-outline">
<!-- Store Name -->
<div class="p-4 space-y-1">
<label class="block text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">门店名称</label>
<input class="w-full border-none p-0 focus:ring-0 text-on-surface font-semibold bg-transparent" placeholder="请输入门店名称" type="text" value="维拉港高级维修中心"/>
</div>
<!-- Contact -->
<div class="p-4 space-y-1">
<label class="block text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">联系电话</label>
<input class="w-full border-none p-0 focus:ring-0 text-on-surface font-semibold bg-transparent" placeholder="请输入联系电话" type="tel" value="+678 22334455"/>
</div>
<!-- Operating Hours -->
<div class="p-4 space-y-3">
<label class="block text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">营业时间</label>

<div class="flex items-center gap-4">
<div class="bg-primary-container text-on-primary-container px-3 py-1 rounded-lg font-bold text-sm">08:00</div>
<span class="text-on-surface-variant">至</span>
<div class="bg-primary-container text-on-primary-container px-3 py-1 rounded-lg font-bold text-sm">18:00</div>
</div>
<button class="text-primary">
<span class="material-symbols-outlined">schedule</span>
</button>
</div>
<div class="flex flex-wrap gap-2 pt-1">
<span class="bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-full">周一</span>
<span class="bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-full">周二</span>
<span class="bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-full">周三</span>
<span class="bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-full">周四</span>
<span class="bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-full">周五</span>
<span class="bg-surface-variant text-on-surface-variant text-[10px] font-bold px-2 py-1 rounded-full">周六</span>
<span class="bg-surface-variant text-on-surface-variant text-[10px] font-bold px-2 py-1 rounded-full">周日</span>

</div>
</section>

<div class="p-4 border-b border-outline">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary mt-0.5">location_on</span>
<textarea class="w-full border-none p-0 focus:ring-0 text-on-surface font-semibold bg-transparent resize-none leading-relaxed" placeholder="请输入详细地址" rows="2">Lini Highway, Port Vila, Shefa Province, Vanuatu</textarea>
</div>
</div>

<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-4 h-1.5 bg-black/20 blur-sm rounded-full"></div>
</div>
</div>
<button class="absolute bottom-3 right-3 bg-white shadow-lg rounded-full px-4 py-2 flex items-center gap-2 text-xs font-bold text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm">ads_click</span>

</div>
</div>
</section>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-[#007E85] text-white h-12 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-[#007E85]/20 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">save</span>

</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-3 pb-safe bg-white/95 dark:bg-slate-900/95 backdrop-blur-lg z-50 border-t border-[#DAE6E7] dark:border-slate-800 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">

<a class="flex flex-col items-center justify-center text-[#5E8A8D] dark:text-slate-500 px-3 py-1 hover:text-[#007E85] transition-all active:scale-95" href="#">

<a class="flex flex-col items-center justify-center text-[#5E8A8D] dark:text-slate-500 px-3 py-1 hover:text-[#007E85] transition-all active:scale-95" href="#">

<span class="material-symbols-outlined">group</span>

<a class="flex flex-col items-center justify-center text-[#007E85] dark:text-[#00A3AD] bg-[#007E85]/10 dark:bg-[#007E85]/20 rounded-xl px-3 py-1 active:scale-95" href="#">
